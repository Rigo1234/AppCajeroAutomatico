<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">
            <p:messages id="mensajes" showDetail="true" closable="true" />

            <div class="atm-container">
                <div class="atm-header">Fico<span class="atm-header-red">RED</span></div>

                <div class="atm-title">Consulta de Saldo</div>
                <div class="atm-subtitle">Sesión Activa</div>
                    <h:form  >
                        <!-- Muestra los datos extraídos del archivo txt -->
                    <p><strong>Usuario: #{cajeroBean.usuarioActivo}</strong></p>
                    <p>Número de cuenta: <strong>#{cajeroBean.cuentaActiva}</strong></p>
                    <p>Tu saldo disponible es: <strong style="color: #80ABE5;">L. #{cajeroBean.saldoActivo}</strong></p>

                    </h:form>
                <p:commandButton value="Salir" styleClass="boton-primario" action="index?faces-redirect=true" />
             </div>
         </h:form>

     </h:body>
 </f:view>
 </html>
