<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">

            <div class="atm-container">
                <div class="atm-header"><h3>Fico<span class="atm-header-red">RED</span></h3></div>

                <div class="atm-title" style="margin-top: 20px">Consulta de Saldo</div>
                <div class="atm-subtitle">Sesión Activa</div>
                    <h:form  >

                    <p><strong>Usuario: #{cajeroBean.usuarioActivo}</strong></p>
                    <p>Número de cuenta: <strong>#{cajeroBean.cuentaActiva}</strong></p>
                    <p>Tu saldo disponible es: <strong style="color: #80ABE5;">L. #{cajeroBean.saldoActivo}</strong></p>

                    </h:form>
                <p:commandButton value="Salir"
                                 action="index?faces-redirect=true"
                                 styleClass="atm-button"
                                 style="margin-top: 25px; max-width: 150px;"/>
             </div>
         </h:form>

     </h:body>
 </f:view>
 </html>
