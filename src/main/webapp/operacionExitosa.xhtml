<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa JSF</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
        <!-- Redirige automaticamente hacia el index -->
        <meta http-equiv="refresh" content="3;url=index.xhtml" />
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">


            <div class="atm-container">
                <div class="atm-header">Fico<span class="atm-header-red">RED</span></div>

                <div class="atm-title">Operacion Exitosa!</div>
                <div class="atm-subtitle">Sesión Activa</div>
                    <h:form  >

                    <p><strong>Usuario: #{cajeroBean.usuarioActivo}</strong></p>
                    <p>Número de cuenta: <strong>#{cajeroBean.cuentaActiva}</strong></p>
                    <p>Tu saldo disponible es: <strong style="color: #80ABE5;">L. #{cajeroBean.saldoActivo}</strong></p>

                        <div style="width: 300px; margin: 15px auto 0 auto;">
                            <p:messages id="msjLogin" globalOnly="false" showDetail="true" closable="false" />
                        </div>

                    </h:form>
             </div>

         </h:form>

     </h:body>
 </f:view>
 </html>
