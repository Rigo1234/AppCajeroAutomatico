<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa JSF</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles.css"/>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">
            <p:messages id="mensajes" showDetail="true" closable="true" />

            <div class="atm-container">
                <p:progressBar id="progressBarIndeterminate" style="height:6px" mode="indeterminate"/>
                <div style="margin-top: 20px"> </div>
                <div class="atm-header">Fico<span class="atm-header-red">RED</span></div>
                <h:form>
                    <div >
                        <h1>Bienvenido a</h1>
                    </div>

                    <div>
                        <!-- Logo Principal -->
                        <div class="logo-principal">
                            <img src="resources/images/ficohsa-logo.png" alt="Logo Ficohsa" />
                        </div>

                        <!-- Mensaje -->
                        <p class="mensaje-retiro">
                            Retiros <span class="resaltado-gratis">GRATIS</span> con tus <br />
                            tarjetas de débito Visa Ficohsa
                        </p>

                        <!-- Línea Divisoria -->
                        <hr class="linea-separadora" />

                        <!-- Logos de Tarjetas-->
                        <div class="logos-tarjetas">
                            <img src="resources/images/mastercard-logo.png" alt="Mastercard" class="img-tarjeta"/>
                            <img src="resources/images/Cirrus-logo.png" alt="Cirrus" class="img-tarjeta-sm "/>
                            <img src="resources/images/pluss.png" alt="Plus" class="img-tarjeta-sm"/>
                            <img src="resources/images/Visa-logo.png" alt="Visa" class="img-tarjeta"/>
                        </div>
                    </div>

                    <div class="msg-retiro"  >
                        <h3 style="margin-top: 10px">Inicia tu retiro sin tarjeta pulsando cualquiera de los botones</h3>
                    </div>

                    <div class="footer">
                        <p:progressBar id="progressBarIndeterminate" style="height:6px" mode="indeterminate"/>
                        <p>&#169; 2026 UTH. PW2 Grupo# 1.</p>
                    </div>

                </h:form>

             </div>

         </h:form>

        <!-- BOTÓN OCULTO  -->
        <h:form id="formularioNavegacion" style="display:none;">
            <h:commandButton id="botonOculto" action="login?faces-redirect=true" />
        </h:form>

        <!-- Captura de teclado -->
        <script type="text/javascript">
            document.addEventListener('keydown', function(event) {
                event.preventDefault();
                var boton = document.getElementById('formularioNavegacion:botonOculto');
                if (boton) {
                    boton.click();
                }
            });
        </script>
     </h:body>

 </f:view>
 </html>
