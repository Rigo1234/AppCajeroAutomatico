<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa JSF</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">
            <p:messages id="mensajes" showDetail="true" closable="true" />

            <div class="atm-container">
                <div class="atm-header">Fico<span class="atm-header-red">RED</span></div>

                <div class="atm-subtitle" style="margin-top: 20px">Sesión Activa</div>
                    <h:form  >

                    <p><strong>Usuario: #{cajeroBean.usuarioActivo}</strong></p>
                    <p>Número de cuenta: <strong>#{cajeroBean.cuentaActiva}</strong></p>
                    <p>Tu saldo disponible es: <strong style="color: #80ABE5;">L. #{cajeroBean.saldoActivo}</strong></p>

                <h3>Simular Deposito</h3>
                <h:form>
                    <h:outputText value="¿Cuánto deseas depositar?: L." />
                    <p:focus for="montoInput" />
                    <h:inputText id="montoInput" value="#{cajeroBean.montoDepositar}" title="Monto a depositar"
                                 onfocus="this.setSelectionRange(0, 0);" validatorMessage="Por favor, ingresa un monto válido." />
                    <p:messages id="messages" showDetail="true" closable="true" />

                    <h:commandButton value="Confirmar Deposito" action="#{cajeroBean.realizarDeposito}" style="margin-right: 15px; margin-top: 25px"/>

                    <h:commandButton value="Cancelar" action="#{cajeroBean.indexNav}" style="margin-right: 15px;" />

                    <p><h:outputText value="#{cajeroBean.mensajeError}" style="color:#80ABE5;" /></p>
                </h:form>


                </h:form>
             </div>

         </h:form>

     </h:body>
 </f:view>
 </html>
