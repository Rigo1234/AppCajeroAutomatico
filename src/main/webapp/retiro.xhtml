<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa JSF</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">

            <div class="atm-container">
                <div class="atm-header">Fico<span class="atm-header-red">RED</span></div>

                <div class="atm-subtitle" style="margin-top: 20px">Sesión Activa</div>
                <h:form id="form-login">

                    <p><strong>Usuario: #{cajeroBean.usuarioActivo}</strong></p>
                    <p>Número de cuenta: <strong>#{cajeroBean.cuentaActiva}</strong></p>
                    <p>Tu saldo disponible es: <strong style="color: #80ABE5;">L. #{cajeroBean.saldoActivo}</strong></p>

                    <h3>Simular Retiro</h3>
                    <h:form>
                        <h:outputText value="¿Cuánto deseas retirar?: L.  " />
                        <p:focus for="montoInput" />

                        <p:inputNumber id="montoInput"
                                       value="#{cajeroBean.montoRetirar}" emptyValue="empty"
                                       required="true" onfocus="this.setSelectionRange(0, 0);"
                                       requiredMessage="¡El monto es obligatorio para retirar!">

                            <f:validateDoubleRange minimum="100" />

                        </p:inputNumber>
                        <br/>

                        <h:commandButton value="Confirmar Retiro" action="#{cajeroBean.realizarRetiro}"
                                         update="msj" style="margin-right: 15px; margin-top: 25px"/>

                        <h:commandButton value="Cancelar" action="#{cajeroBean.indexNav}"
                                         immediate="true"
                                         process="@this"
                                         update="@form" style="margin-right: 15px;" />

                        <!-- Muestra validacion de monto-->
                        <div style="width: 600px; margin: 15px auto 0 auto;">
                            <p:messages id="msjLogin" globalOnly="false" showDetail="true" closable="false" />
                        </div>

                    </h:form>


                </h:form>
            </div>

        </h:form>

    </h:body>
</f:view>
</html>
