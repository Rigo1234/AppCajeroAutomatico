<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>ATM Ficohsa JSF</title>
    <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles.css"/>
    <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
</h:head>

<f:metadata>
    <f:viewAction action="#{cajeroBean.limpiarCampos}" />
</f:metadata>

<h:body>
    <h:form id="form-login">

    <div class="contenedor-login">
        <h2 >Fico<span class="atm-header-red">RED</span></h2>
        <h3>Bienvenido</h3>
        <h4>Ingrese sus datos</h4>

        <h:form>
            <h:panelGrid align="center" columns="1" styleClass="panel-grid-login">
                <h:outputText for="usuario" value="Usuario: " />
                <p:inputText id="usuario" value="#{cajeroBean.usuarioIngresado}"
                             required="true" requiredMessage=" El usuario es obligatorio"/>

                <h5><p:outputLabel for="pin" value="Pin/Contraseña: "/></h5>
                <p:password id="pin" value="#{cajeroBean.contrasenaIngresada}" toggleMask="true"
                            redisplay="true" required="true" requiredMessage="La contraseña es obligatoria"/>

            </h:panelGrid>


            <h:commandButton value="Ingresar" action="#{cajeroBean.iniciarSesion}"
                             update="msjLogin" styleClass="boton-primario"  style="margin-top: 10px;"/>
            <h:commandButton value="Cancelar" action="#{cajeroBean.indexNav}"
                             immediate="true"
                             process="@this"
                             update="@form" styleClass="boton-primario" />

            <!-- Muestra errores en rojo si fallan las credenciales-->
            <div style="width: 300px; margin: 15px auto 0 auto;">
                <p:messages id="msjLogin" globalOnly="false" showDetail="false" closable="false" />
            </div>

        </h:form>
    </div>
    </h:form>
</h:body>
</html>
