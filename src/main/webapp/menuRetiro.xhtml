<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">
<f:view>
    <h:head>
        <title>ATM Ficohsa JSF</title>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles2.css"/>
    </h:head>
    <h:body styleClass="atm-body">

        <h:form id="formCajero">

            <div class="atm-container">
                <div class="atm-header">Fico<span class="atm-header-red">RED</span></div>

                <div class="atm-title">Retiro Rápido</div>
                <p class="atm-subtitle">Seleccione el monto que desea retirar</p>

                <p:panelGrid columns="2" layout="grid" styleClass="ui-panelgrid-blank">

                    <p:commandButton value="100.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true">
                        <f:setPropertyActionListener value="100" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="1,000.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true" >
                        <f:setPropertyActionListener value="1000" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="200.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true" >
                        <f:setPropertyActionListener value="200" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="1,500.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true" >
                        <f:setPropertyActionListener value="1500" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="300.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true" >
                        <f:setPropertyActionListener value="300" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="2,000.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true" >
                        <f:setPropertyActionListener value="2000" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="500.00" styleClass="atm-button"
                                     action="retiro?faces-redirect=true">
                        <f:setPropertyActionListener value="500" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                    <p:commandButton value="Otro Monto" styleClass="atm-button"
                                     action="retiro?faces-redirect=true">
                        <f:setPropertyActionListener value="" target="#{cajeroBean.montoRetirar}" />
                    </p:commandButton>

                </p:panelGrid>
            </div>

        </h:form>

    </h:body>
</f:view>
</html>
